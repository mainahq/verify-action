name: 'Maina Verify'
description: 'Run maina verification on your pull request'
inputs:
  token:
    description: 'Maina API token'
    required: true
  base:
    description: 'Base branch for diff comparison'
    required: false
    default: 'main'
  cloud_url:
    description: 'Maina cloud API URL'
    required: false
    default: 'https://api.mainahq.com'
  github_token:
    description: 'GitHub token for posting sticky comment + Check Run on the PR. Pass ${{ secrets.GITHUB_TOKEN }} and set permissions.pull-requests and permissions.checks to write.'
    required: false
    default: ''
outputs:
  passed:
    description: 'Whether verification passed'
  findings_count:
    description: 'Number of findings'
  proof_url:
    description: 'URL to verification proof'
  report_url:
    description: 'Public report permalink (https://mainahq.com/r/<run-id>)'
  run_id:
    description: 'Verification run id'
runs:
  using: 'node20'
  main: 'dist/index.js'
